<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaron DeNuto</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    color: black;
  }

  /* Background */
  .bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000') center/cover no-repeat;
    filter: blur(6px) grayscale(100%);
    z-index: -1;
  }

  /* Navbar */
  .nav {
    position: absolute;
    top: 20px;
    right: 40px;
    display: flex;
    gap: 25px;
    font-size: 14px;
  }

  .nav a {
    text-decoration: none;
    color: black;
    opacity: 0.8;
  }

  /* Hero */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 0.6s;
  }

  .hero h1 {
    font-size: 4em;
    margin: 0;
    font-weight: 500;
  }

  .hero p {
    margin-top: 10px;
    font-size: 1.5em;
    opacity: 0.7;
  }

  /* Game mode */
  .game {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    color: white;
    background: black;
    font-size: 2em;
  }

  .fade {
    opacity: 0;
  }

  .button {
    margin-top: 30px;
    padding: 10px 20px;
    border: 1px solid black;
    cursor: pointer;
    transition: 0.2s;
  }

  .button:hover {
    background: black;
    color: white;
  }
</style>
</head>

<body>

<div class="bg"></div>

<!-- NAV -->
<div class="nav">
  <a href="#">About</a>
  <a href="#">Projects</a>
  <a href="#">Contact</a>
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>Aaron DeNuto</h1>
  <p>Interactive Portfolio</p>
  <div class="button" onclick="startGame()">Enter</div>
</div>

<!-- GAME -->
<div class="game" id="game">
  <div id="gameText">Click anywhere</div>
</div>

<script>
  function startGame() {
    document.getElementById("hero").classList.add("fade");
    setTimeout(() => {
      document.getElementById("hero").style.display = "none";
      document.getElementById("game").style.display = "flex";
    }, 600);
  }

  let count = 0;

  document.getElementById("game").addEventListener("click", () => {
    count++;
    document.getElementById("gameText").innerText =
      "Clicks: " + count;
  });
</script>

</body>
</html>
