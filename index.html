<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaron DeNuto</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    color: white;
    background: black;
  }

  .bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000') center/cover no-repeat;
    filter: blur(6px) grayscale(100%);
    z-index: -2;
  }

  .bg::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
  }

  .nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: black;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    box-sizing: border-box;
  }

  .profile {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: url('https://via.placeholder.com/100') center/cover no-repeat;
  }

  .right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .right a {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: white;
    font-size: 14px;
    opacity: 0.85;
    transition: opacity 0.2s ease;
  }

  .right a:hover {
    opacity: 1;
  }

  .right img {
    height: 22px;
    width: 22px;
    object-fit: contain;
    display: block;
    transition: transform 0.15s ease, opacity 0.2s ease;
  }

  .right a:hover img {
    transform: scale(1.15);
    opacity: 0.9;
  }

  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-top: 70px;
    text-align: center;
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    margin: 0;
  }

  p {
    font-size: 1.5rem;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="bg"></div>

<div class="nav">
  <div class="profile"></div>

  <div class="right">

    <!-- X -->
    <a href="https://x.com/aarondenuto" target="_blank">
      <img src="https://cdn.simpleicons.org/x/ffffff" alt="X">
    </a>

    <!-- YouTube (icon only) -->
    <a href="https://youtube.com/@aarondenuto" target="_blank">
      <img src="https://cdn.simpleicons.org/youtube/ff0000" alt="YouTube">
    </a>

    <!-- Instagram (official gradient) -->
    <a href="https://instagram.com/aarondenuto" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
    </a>

    <!-- Facebook -->
    <a href="https://facebook.com/aarondenuto" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook">
    </a>

    <!-- TikTok -->
    <a href="https://tiktok.com/@aarondenuto" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/TikTok_logo.svg" alt="TikTok">
    </a>

    <!-- LinkedIn (fixed) -->
    <a href="https://linkedin.com/in/aaron-denuto" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/01/LinkedIn_Logo.svg" alt="LinkedIn">
    </a>

    <!-- GitHub -->
    <a href="https://github.com/aarondenuto" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg" alt="GitHub">
    </a>

    <a href="/portfolio/">Portfolio</a>

  </div>
</div>

<main class="hero">
  <h1>Aaron DeNuto</h1>
  <p>Interactive Portfolio</p>
</main>

</body>
</html>
