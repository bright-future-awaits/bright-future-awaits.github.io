<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaron DeNuto</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
    background: black;
    overflow: hidden;
  }

  .bg {
    position: fixed;
    inset: 0;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000') center/cover no-repeat;
    filter: blur(6px) grayscale(100%);
    z-index: -2;
  }

  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
  }

  .nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    z-index: 10;
  }

  .profile {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: url('https://via.placeholder.com/100') center/cover no-repeat;
  }

  .right {
    display: flex;
    gap: 18px;
  }

  .right img {
    width: 22px;
    height: 22px;
  }

  .portfolio {
    color: black;
    text-decoration: none;
    margin-left: 10px;
  }

  .hero {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    margin: 0;
  }

  p {
    opacity: 0.7;
    font-size: 1.5rem;
  }

  .play-btn {
    margin-top: 20px;
    padding: 12px 24px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    font-size: 16px;
    z-index: 5;
  }

  /* GAME LAYER */
  .game-container {
    position: fixed;
    inset: 0;
    background: #444; /* grayish */
    opacity: 0;
    pointer-events: none; /* allows button to stay clickable */
    transition: opacity 0.4s ease;
    z-index: 999;
  }

  canvas {
    display: block;
  }

  .exit {
    position: absolute;
    top: 20px;
    right: 20px;
    background: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    z-index: 1000;
  }
</style>
</head>

<body>

<div class="bg"></div>

<div class="nav">
  <div class="profile"></div>

  <div class="right">
    <img src="assets/X_Icon.svg">
    <img src="assets/YouTube_Icon.svg">
    <img src="assets/Instagram_Icon.svg">
    <img src="assets/Facebook_Icon.svg">
    <img src="assets/TikTok_Icon.svg">
    <img src="assets/LinkedIn_Icon.svg">
    <img src="assets/GitHub_Icon.svg">
    <a href="/portfolio/" class="portfolio">Portfolio</a>
  </div>
</div>

<main class="hero">
  <h1>Aaron DeNuto</h1>
  <p>Interactive Portfolio</p>
  <button class="play-btn" id="playBtn">Enter World</button>
</main>

<div class="game-container" id="gameContainer">
  <button class="exit" onclick="exitGame()">Exit</button>
  <canvas id="game"></canvas>
</div>

<script>
const btn = document.getElementById("playBtn");
const gameContainer = document.getElementById("gameContainer");

/* --- PROXIMITY FADE (does NOT block button) --- */
document.addEventListener("mousemove", e => {
  if (gameContainer.dataset.active === "true") return;

  const rect = btn.getBoundingClientRect();
  const bx = rect.left + rect.width / 2;
  const by = rect.top + rect.height / 2;

  const dx = e.clientX - bx;
  const dy = e.clientY - by;
  const distance = Math.sqrt(dx*dx + dy*dy);

  const maxDist = 300;
  let opacity = 1 - (distance / maxDist);
  opacity = Math.max(0, Math.min(0.5, opacity * 0.5));

  gameContainer.style.opacity = opacity;
});

/* --- CLICK ENTER --- */
btn.addEventListener("click", () => {
  gameContainer.dataset.active = "true";
  gameContainer.style.pointerEvents = "auto";
  gameContainer.style.opacity = 1;
  running = true;
  loop();
});

/* --- EXIT --- */
function exitGame() {
  gameContainer.dataset.active = "false";
  gameContainer.style.pointerEvents = "none";
  gameContainer.style.opacity = 0;
  running = false;
}

/* --- GAME --- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: 200, y: 200, size: 20, speed: 3 };
let keys = {};
let running = false;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update() {
  if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
  if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
  if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;
}

function draw() {
  /* gray world, no grid */
  ctx.fillStyle = "#555";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  /* player */
  ctx.fillStyle = "white";
  ctx.fillRect(player.x, player.y, player.size, player.size);
}

function loop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
