<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaron DeNuto</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    color: black;
  }

  .bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000') center/cover no-repeat;
    filter: blur(6px) grayscale(100%);
    z-index: -1;
  }

  .nav {
    position: absolute;
    top: 20px;
    right: 40px;
    display: flex;
    gap: 25px;
    font-size: 14px;
  }

  .nav a {
    text-decoration: none;
    color: black;
    opacity: 0.8;
  }

  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  h1 {
    font-size: 4em;
    margin: 0;
  }

  p {
    font-size: 1.5em;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="bg"></div>

<div class="nav">
  <a href="/portfolio/">Portfolio</a>
</div>

<div class="hero">
  <h1>Aaron DeNuto</h1>
  <p>Interactive Portfolio</p>
</div>

</body>
</html>
