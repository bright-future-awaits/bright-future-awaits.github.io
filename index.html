<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaron DeNuto</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
    background: black;
    overflow: hidden;
  }

  .bg {
    position: fixed;
    inset: 0;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000') center/cover no-repeat;
    filter: blur(6px) grayscale(100%);
    z-index: -2;
  }

  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
  }

  .nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    z-index: 10;
    transition: opacity 0.4s ease;
  }

  .profile {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: url('https://via.placeholder.com/100') center/cover no-repeat;
  }

  .right {
    display: flex;
    gap: 18px;
  }

  .right img {
    width: 22px;
    height: 22px;
  }

  .portfolio {
    color: black;
    text-decoration: none;
    margin-left: 10px;
  }

  .hero {
    position: relative;
    z-index: 5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.4s ease;
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    margin: 0;
  }

  p {
    opacity: 0.7;
    font-size: 1.5rem;
  }

  .play-btn {
    margin-top: 20px;
    padding: 12px 24px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    font-size: 16px;
  }

  /* GAME LAYER */
  .game-container {
    position: fixed;
    inset: 0;
    background: #444;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 1;
  }

  canvas {
    display: block;
  }

  .exit {
    position: absolute;
    top: 20px;
    right: 20px;
    background: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    z-index: 1000;
  }
</style>
</head>

<body>

<div class="bg"></div>

<div class="nav">
  <div class="profile"></div>

  <div class="right">
    <img src="assets/X_Icon.svg">
    <img src="assets/YouTube_Icon.svg">
    <img src="assets/Instagram_Icon.svg">
    <img src="assets/Facebook_Icon.svg">
    <img src="assets/TikTok_Icon.svg">
    <img src="assets/LinkedIn_Icon.svg">
    <img src="assets/GitHub_Icon.svg">
    <a href="/portfolio/" class="portfolio">Portfolio</a>
  </div>
</div>

<main class="hero">
  <h1>Aaron DeNuto</h1>
  <p>Interactive Portfolio</p>
  <button class="play-btn" id="playBtn">Enter World</button>
</main>

<div class="game-container" id="gameContainer">
  <button class="exit" onclick="exitGame()">Exit</button>
  <canvas id="game"></canvas>
</div>

<script>
const btn = document.getElementById("playBtn");
const gameContainer = document.getElementById("gameContainer");
const hero = document.querySelector(".hero");
const nav = document.querySelector(".nav");

/* --- GAME SETUP --- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let player = { x: 200, y: 200, size: 20, speed: 3 };
let keys = {};
let running = false;

/* --- INPUT --- */
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

/* --- UPDATE --- */
function update() {
  if (!running) return;

  if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
  if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
  if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;

  // boundaries
  player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
}

/* --- DRAW --- */
function draw() {
  ctx.fillStyle = "#555";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  ctx.fillRect(player.x, player.y, player.size, player.size);
}

/* --- FIXED FPS LOOP --- */
let lastTime = 0;
const fps = 60;
const frameDuration = 1000 / fps;
let accumulator = 0;

function loop(currentTime) {
  if (!running) return;

  const delta = currentTime - lastTime;
  lastTime = currentTime;
  accumulator += delta;

  while (accumulator >= frameDuration) {
    update();
    accumulator -= frameDuration;
  }

  draw();
  requestAnimationFrame(loop);
}

/* --- ENTER GAME --- */
btn.addEventListener("click", () => {
  gameContainer.style.zIndex = 999;
  gameContainer.style.pointerEvents = "auto";

  hero.style.opacity = "0";
  nav.style.opacity = "0";
  gameContainer.style.opacity = "1";

  setTimeout(() => {
    running = true;
    lastTime = performance.now();
    loop(lastTime);
  }, 400);
});

/* --- EXIT GAME --- */
function exitGame() {
  running = false;

  gameContainer.style.opacity = "0";
  gameContainer.style.pointerEvents = "none";

  hero.style.opacity = "1";
  nav.style.opacity = "1";

  gameContainer.style.zIndex = 1;
}
</script>

</body>
</html>
