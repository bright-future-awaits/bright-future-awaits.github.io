<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaron DeNuto</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
    background: black;
    overflow: hidden;
  }

  /* Background */
  .bg {
    position: fixed;
    inset: 0;
    background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2000') center/cover no-repeat;
    filter: blur(6px) grayscale(100%);
    z-index: -2;
  }

  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: -1;
  }

  /* Navbar */
  .nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 70px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    box-sizing: border-box;
    z-index: 10;
  }

  .profile {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: url('https://via.placeholder.com/100') center/cover no-repeat;
  }

  .right {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .right a {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .right img {
    width: 22px;
    height: 22px;
  }

  .portfolio {
    color: black;
    text-decoration: none;
    margin-left: 10px;
    font-size: 14px;
  }

  /* Hero */
  .hero {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-top: 70px;
    text-align: center;
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    margin: 0;
  }

  p {
    opacity: 0.7;
    font-size: 1.5rem;
  }

  .play-btn {
    margin-top: 20px;
    padding: 12px 24px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    font-size: 16px;
    transition: transform 0.15s ease, opacity 0.2s ease;
  }

  .play-btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
  }

  /* Game Layer */
  .game-container {
    position: fixed;
    inset: 0;
    background: #222;
    display: none;
    z-index: 999;
  }

  canvas {
    display: block;
  }

  .exit {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 1000;
    background: white;
    border: none;
    padding: 10px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="bg"></div>

<div class="nav">
  <div class="profile"></div>

  <div class="right">
    <a href="https://x.com/aarondenuto" target="_blank"><img src="assets/X_Icon.svg"></a>
    <a href="https://youtube.com/@aarondenuto" target="_blank"><img src="assets/YouTube_Icon.svg"></a>
    <a href="https://instagram.com/aarondenuto" target="_blank"><img src="assets/Instagram_Icon.svg"></a>
    <a href="https://facebook.com/aarondenuto" target="_blank"><img src="assets/Facebook_Icon.svg"></a>
    <a href="https://tiktok.com/@aarondenuto" target="_blank"><img src="assets/TikTok_Icon.svg"></a>
    <a href="https://linkedin.com/in/aaron-denuto" target="_blank"><img src="assets/LinkedIn_Icon.svg"></a>
    <a href="https://github.com/aarondenuto" target="_blank"><img src="assets/GitHub_Icon.svg"></a>
    <a href="/portfolio/" class="portfolio">Portfolio</a>
  </div>
</div>

<main class="hero">
  <h1>Aaron DeNuto</h1>
  <p>Interactive Portfolio</p>
  <button class="play-btn" onclick="startGame()">Enter World</button>
</main>

<div class="game-container" id="gameContainer">
  <button class="exit" onclick="exitGame()">Exit</button>
  <canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: 200, y: 200, size: 20, speed: 3 };
let keys = {};
let running = false;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function startGame() {
  document.getElementById("gameContainer").style.display = "block";
  running = true;
  loop();
}

function exitGame() {
  document.getElementById("gameContainer").style.display = "none";
  running = false;
}

function update() {
  if (keys["w"] || keys["ArrowUp"]) player.y -= player.speed;
  if (keys["s"] || keys["ArrowDown"]) player.y += player.speed;
  if (keys["a"] || keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["d"] || keys["ArrowRight"]) player.x += player.speed;
}

function draw() {
  ctx.fillStyle = "#3cb043";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(0,0,0,0.1)";
  for (let x = 0; x < canvas.width; x += 40) {
    for (let y = 0; y < canvas.height; y += 40) {
      ctx.strokeRect(x, y, 40, 40);
    }
  }

  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, player.size, player.size);
}

function loop() {
  if (!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
