<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Have You Ever — Aaron DeNuto</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --accent: #e8ff47;
    --accent2: #ff4d6d;
    --text: #f0f0f0;
    --muted: #555;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 20%, rgba(232,255,71,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,77,109,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .screen { display: none; width: 100%; max-width: 480px; }
  .screen.active { display: flex; flex-direction: column; gap: 16px; }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 12vw, 5.5rem);
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span { color: var(--accent2); }

  .tagline {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: -8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    letter-spacing: 0.05em;
  }

  input::placeholder { color: var(--muted); }

  input:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #0a0a0a;
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.12em;
    padding: 14px 20px;
    transition: all 0.15s ease;
    width: 100%;
  }

  .btn:hover { background: #f5ff70; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-ghost:hover { background: var(--border); background: #1a1a1a; }

  .btn-red { background: var(--accent2); }
  .btn-red:hover { background: #ff6b84; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
  }

  /* LOBBY */
  .room-id-display {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }

  .room-id-display .code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.3em;
    color: var(--accent);
  }

  .player-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .player-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
  }

  .player-item .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .host-badge {
    margin-left: auto;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--accent2);
    text-transform: uppercase;
  }

  /* GAME */
  .question-num {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .question-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    line-height: 1.1;
    letter-spacing: 0.04em;
  }

  .vote-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 4px;
  }

  .vote-btn {
    border: 2px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.1em;
    padding: 28px 10px;
    text-align: center;
    transition: all 0.15s ease;
    background: var(--surface);
    color: var(--text);
  }

  .vote-btn:hover { transform: scale(1.02); }
  .vote-btn.yes:hover { border-color: var(--accent); color: var(--accent); }
  .vote-btn.no:hover { border-color: var(--accent2); color: var(--accent2); }
  .vote-btn.selected.yes { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.07); }
  .vote-btn.selected.no { border-color: var(--accent2); color: var(--accent2); background: rgba(255,77,109,0.07); }
  .vote-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  .waiting-text {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    padding: 10px 0;
  }

  /* RESULTS BAR */
  .result-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .result-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    letter-spacing: 0.1em;
  }

  .result-label .big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    color: var(--accent);
    line-height: 1;
  }

  .bar-track {
    background: var(--bg);
    border-radius: 2px;
    height: 8px;
    overflow: hidden;
  }

  .bar-fill {
    background: var(--accent);
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  }

  /* FINAL */
  .final-list { display: flex; flex-direction: column; gap: 8px; }

  .final-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    gap: 10px;
  }

  .final-item .q { flex: 1; color: var(--muted); font-size: 11px; line-height: 1.4; }
  .final-item .pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--accent);
    flex-shrink: 0;
  }

  .error-msg {
    font-size: 12px;
    color: var(--accent2);
    letter-spacing: 0.05em;
    min-height: 16px;
  }

  .status-bar {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .pulsing { animation: pulse 1.5s ease infinite; }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="logo">Have<br>You<br><span>Ever</span></div>
  <div class="tagline">Multiplayer · Real-time · Uncensored</div>

  <div class="card">
    <div class="card-label">Create a room</div>
    <input id="host-name" type="text" placeholder="Your name" maxlength="20">
    <button class="btn" onclick="createRoom()">Create Room</button>
  </div>

  <div class="card">
    <div class="card-label">Join a room</div>
    <input id="join-name" type="text" placeholder="Your name" maxlength="20">
    <input id="join-code" type="text" placeholder="Room code" maxlength="6" style="text-transform:uppercase">
    <button class="btn btn-ghost" onclick="joinRoom()">Join Room</button>
  </div>

  <div class="error-msg" id="home-error"></div>
  <div class="status-bar" id="conn-status">Connecting…</div>
</div>

<!-- LOBBY -->
<div class="screen" id="screen-lobby">
  <div class="logo" style="font-size:2.5rem">Lobby</div>

  <div class="room-id-display">
    <div class="card-label" style="margin-bottom:6px">Room Code</div>
    <div class="code" id="lobby-code">----</div>
  </div>

  <div class="card">
    <div class="card-label">Players <span id="player-count" style="color:var(--accent)">0</span></div>
    <div class="player-list" id="player-list"></div>
  </div>

  <button class="btn" id="start-btn" onclick="startGame()" style="display:none">Start Game</button>
  <div class="waiting-text pulsing" id="wait-msg">Waiting for host to start…</div>
  <div class="error-msg" id="lobby-error"></div>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div class="question-num" id="q-num">Question 1 / 10</div>
  <div class="question-text" id="q-text">Loading…</div>

  <div class="vote-btns">
    <div class="vote-btn yes" id="btn-yes" onclick="vote('yes')">YES</div>
    <div class="vote-btn no" id="btn-no" onclick="vote('no')">NO</div>
  </div>

  <div class="waiting-text pulsing" id="vote-wait" style="display:none">Waiting for others…</div>

  <div id="result-section" style="display:none">
    <div class="result-bar-wrap">
      <div class="result-label">
        <div><div class="big" id="res-pct">0%</div><div>said YES</div></div>
        <div style="text-align:right"><div id="res-count" style="font-size:1.5rem;font-family:'Bebas Neue',sans-serif;color:var(--text)">0/0</div><div>players</div></div>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
    </div>
    <button class="btn" id="next-btn" onclick="nextRound()" style="display:none;margin-top:10px">Next Question</button>
    <button class="btn btn-red" id="finish-btn" onclick="nextRound()" style="display:none;margin-top:10px">See Final Results</button>
    <div class="waiting-text pulsing" id="next-wait" style="display:none">Waiting for host…</div>
  </div>
</div>

<!-- FINAL -->
<div class="screen" id="screen-final">
  <div class="logo" style="font-size:2.5rem">Results</div>
  <div class="final-list" id="final-list"></div>
  <button class="btn btn-ghost" onclick="goHome()" style="margin-top:8px">Play Again</button>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const BACKEND = "https://have-you-ever-backend.onrender.com"; // ← replace after deploying backend

// ── SOCKET ──────────────────────────────────────────────────────────────────
const socket = io(BACKEND, { transports: ["websocket", "polling"] });

let myName = "";
let myRoom = "";
let isHost = false;
let voted = false;
let finalResults = [];

// ── CONNECTION ───────────────────────────────────────────────────────────────
socket.on("connect", () => {
  document.getElementById("conn-status").textContent = "Connected ✓";
  document.getElementById("conn-status").style.color = "#4caf50";
});

socket.on("connect_error", () => {
  document.getElementById("conn-status").textContent = "Connection failed — check backend URL";
  document.getElementById("conn-status").style.color = "var(--accent2)";
});

socket.on("disconnect", () => {
  document.getElementById("conn-status").textContent = "Disconnected";
});

// ── SOCKET EVENTS ────────────────────────────────────────────────────────────
socket.on("room_created", ({ roomId }) => {
  myRoom = roomId;
  isHost = true;
  showLobby();
});

socket.on("room_joined", ({ roomId }) => {
  myRoom = roomId;
  showLobby();
});

socket.on("error", ({ message }) => {
  setError("home-error", message);
  setError("lobby-error", message);
});

socket.on("room_update", ({ players }) => {
  document.getElementById("player-count").textContent = players.length;
  const list = document.getElementById("player-list");
  list.innerHTML = players.map(p => `
    <div class="player-item">
      <div class="dot"></div>
      <span>${p.name}</span>
      ${p.isHost ? '<span class="host-badge">host</span>' : ''}
    </div>
  `).join("");
});

socket.on("game_started", () => {
  showScreen("screen-game");
});

socket.on("new_question", ({ question, index, total }) => {
  voted = false;
  document.getElementById("q-num").textContent = `Question ${index + 1} / ${total}`;
  document.getElementById("q-text").textContent = question;

  const btnY = document.getElementById("btn-yes");
  const btnN = document.getElementById("btn-no");
  btnY.classList.remove("selected");
  btnN.classList.remove("selected");
  btnY.removeAttribute("disabled");
  btnN.removeAttribute("disabled");

  document.getElementById("vote-wait").style.display = "none";
  document.getElementById("result-section").style.display = "none";
});

socket.on("round_result", ({ yes, total, isLast }) => {
  const pct = total > 0 ? Math.round((yes / total) * 100) : 0;

  document.getElementById("res-pct").textContent = pct + "%";
  document.getElementById("res-count").textContent = `${yes}/${total}`;
  document.getElementById("bar-fill").style.width = pct + "%";
  document.getElementById("vote-wait").style.display = "none";
  document.getElementById("result-section").style.display = "block";

  if (isHost) {
    document.getElementById(isLast ? "finish-btn" : "next-btn").style.display = "block";
    document.getElementById("next-wait").style.display = "none";
  } else {
    document.getElementById("next-wait").style.display = "block";
  }
});

socket.on("game_over", ({ results }) => {
  finalResults = results;
  showFinal(results);
});

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function createRoom() {
  const name = document.getElementById("host-name").value.trim();
  if (!name) return setError("home-error", "Enter your name");
  myName = name;
  isHost = true;
  socket.emit("create_room", { name });
}

function joinRoom() {
  const name = document.getElementById("join-name").value.trim();
  const code = document.getElementById("join-code").value.trim().toUpperCase();
  if (!name) return setError("home-error", "Enter your name");
  if (!code) return setError("home-error", "Enter a room code");
  myName = name;
  socket.emit("join_room", { name, roomId: code });
}

function startGame() {
  socket.emit("start_game", { roomId: myRoom });
}

function vote(choice) {
  if (voted) return;
  voted = true;

  document.getElementById("btn-yes").setAttribute("disabled", true);
  document.getElementById("btn-no").setAttribute("disabled", true);
  document.getElementById("btn-" + choice).classList.add("selected");
  document.getElementById("vote-wait").style.display = "block";

  socket.emit("submit_vote", { roomId: myRoom, vote: choice });
}

function nextRound() {
  document.getElementById("next-btn").style.display = "none";
  document.getElementById("finish-btn").style.display = "none";
  socket.emit("next_round", { roomId: myRoom });
}

function goHome() {
  myRoom = "";
  isHost = false;
  voted = false;
  document.getElementById("host-name").value = "";
  document.getElementById("join-name").value = "";
  document.getElementById("join-code").value = "";
  showScreen("screen-home");
}

// ── UI HELPERS ───────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function showLobby() {
  document.getElementById("lobby-code").textContent = myRoom;
  document.getElementById("start-btn").style.display = isHost ? "block" : "none";
  document.getElementById("wait-msg").style.display = isHost ? "none" : "block";
  showScreen("screen-lobby");
}

function showFinal(results) {
  const list = document.getElementById("final-list");
  list.innerHTML = results.map(r => {
    const pct = r.total > 0 ? Math.round((r.yes / r.total) * 100) : 0;
    return `<div class="final-item">
      <div class="q">${r.question}</div>
      <div class="pct">${pct}%</div>
    </div>`;
  }).join("");
  showScreen("screen-final");
}

function setError(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; setTimeout(() => el.textContent = "", 3000); }
}
</script>
</body>
</html>
