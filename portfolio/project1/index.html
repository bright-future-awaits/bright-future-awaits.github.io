<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOM</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
  }

  h1 { margin-bottom: 10px; }

  #status {
    font-size: 14px;
    opacity: 0.6;
    margin-bottom: 20px;
  }

  select {
    padding: 10px;
    margin-bottom: 20px;
    background: #222;
    color: white;
    border: none;
  }

  .meal { margin-bottom: 25px; }

  .item {
    opacity: 0.85;
    margin-left: 10px;
    margin-top: 4px;
  }
</style>
</head>

<body>

<h1>NOM</h1>
<div id="status">Initializing...</div>

<select id="hallSelect"></select>
<div id="menu"></div>

<script>
const PROXY = "https://corsproxy.io/?";
const URL = "https://dining.ucla.edu/menus-at-a-glance/";

let data = [];

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
  console.log(msg);
}

async function loadMenu() {
  try {
    setStatus("Fetching menu...");

    const res = await fetch(PROXY + URL);
    setStatus("Response status: " + res.status);

    const html = await res.text();
    setStatus("HTML received");

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    // DEBUG: check structure
    console.log(doc);

    const halls = doc.querySelectorAll(".menu-block");
    setStatus("Halls found: " + halls.length);

    if (halls.length === 0) {
      setStatus("ERROR: No data found (selectors likely broken)");
      return;
    }

    halls.forEach(hall => {
      const hallName = hall.querySelector("h3")?.innerText.trim();
      if (!hallName) return;

      const meals = {};

      hall.querySelectorAll(".col-md-4").forEach(col => {
        const mealName = col.querySelector("h4")?.innerText.trim();
        if (!mealName) return;

        const items = [];
        col.querySelectorAll("li").forEach(li => {
          items.push(li.innerText.trim());
        });

        meals[mealName] = items;
      });

      data.push({ diningHall: hallName, meals });
    });

    initUI();
    setStatus("Loaded successfully");

  } catch (err) {
    console.error(err);
    setStatus("ERROR: " + err.message);
  }
}

function initUI() {
  const select = document.getElementById("hallSelect");

  data.forEach((hall, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = hall.diningHall;
    select.appendChild(option);
  });

  render(0);

  select.addEventListener("change", e => {
    render(e.target.value);
  });
}

function render(index) {
  const hall = data[index];
  const container = document.getElementById("menu");
  container.innerHTML = "";

  Object.entries(hall.meals).forEach(([meal, items]) => {
    const div = document.createElement("div");
    div.className = "meal";

    const title = document.createElement("h3");
    title.textContent = meal;
    div.appendChild(title);

    items.forEach(item => {
      const el = document.createElement("div");
      el.className = "item";
      el.textContent = item;
      div.appendChild(el);
    });

    container.appendChild(div);
  });
}

console.log("script loaded");
loadMenu();
</script>

</body>
</html>
