<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOM</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
  }

  h1 { margin-bottom: 10px; }

  #status {
    font-size: 14px;
    opacity: 0.6;
    margin-bottom: 20px;
  }

  select {
    padding: 10px;
    margin-bottom: 20px;
    background: #222;
    color: white;
    border: none;
  }

  .meal { margin-bottom: 25px; }

  .item {
    opacity: 0.85;
    margin-left: 10px;
    margin-top: 4px;
  }
</style>
</head>

<body>

<h1>NOM</h1>
<div id="status">Starting...</div>

<select id="hallSelect"></select>
<div id="menu"></div>

<script>
const PROXY = "https://api.allorigins.win/raw?url=";
const URL = "https://dining.ucla.edu/menus-at-a-glance/";

let data = [];

function setStatus(msg) {
  const el = document.getElementById("status");
  if (el) el.textContent = msg;
  console.log(msg);
}

async function loadMenu() {
  try {
    setStatus("Fetching menu...");

    const res = await fetch(PROXY + encodeURIComponent(URL));
    setStatus("Response status: " + res.status);

    if (!res.ok) {
      setStatus("ERROR: Request failed");
      return;
    }

    const html = await res.text();

    if (!html || html.length < 1000) {
      setStatus("ERROR: Invalid HTML (proxy blocked)");
      return;
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    // find all dining hall headers
    const hallHeaders = [...doc.querySelectorAll("h3")];

    setStatus("Hall headers found: " + hallHeaders.length);

    data = [];

    hallHeaders.forEach(h3 => {
      const hallName = h3.innerText.trim();
      const parent = h3.parentElement;

      if (!hallName || !parent) return;

      const meals = {};

      parent.querySelectorAll("h4").forEach(mealEl => {
        const mealName = mealEl.innerText.trim();
        let items = [];

        let el = mealEl.nextElementSibling;

        while (el && el.tagName !== "H4") {
          if (el.tagName === "UL") {
            el.querySelectorAll("li").forEach(li => {
              const text = li.innerText.trim();
              if (text) items.push(text);
            });
          }
          el = el.nextElementSibling;
        }

        if (mealName && items.length) {
          meals[mealName] = items;
        }
      });

      if (Object.keys(meals).length > 0) {
        data.push({ diningHall: hallName, meals });
      }
    });

    if (data.length === 0) {
      setStatus("ERROR: Parsing failed (structure changed)");
      return;
    }

    initUI();
    setStatus("Loaded successfully");

  } catch (err) {
    console.error(err);
    setStatus("ERROR: " + err.message);
  }
}

function initUI() {
  const select = document.getElementById("hallSelect");
  select.innerHTML = "";

  data.forEach((hall, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = hall.diningHall;
    select.appendChild(option);
  });

  render(0);

  select.addEventListener("change", e => {
    render(e.target.value);
  });
}

function render(index) {
  const hall = data[index];
  const container = document.getElementById("menu");
  container.innerHTML = "";

  Object.entries(hall.meals).forEach(([meal, items]) => {
    const div = document.createElement("div");
    div.className = "meal";

    const title = document.createElement("h3");
    title.textContent = meal;
    div.appendChild(title);

    items.forEach(item => {
      const el = document.createElement("div");
      el.className = "item";
      el.textContent = item;
      div.appendChild(el);
    });

    container.appendChild(div);
  });
}

loadMenu();
</script>

</body>
</html>
