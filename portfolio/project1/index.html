<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOM</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
  }

  h1 { margin-bottom: 10px; }

  #status {
    font-size: 14px;
    opacity: 0.6;
    margin-bottom: 20px;
  }

  select {
    padding: 10px;
    margin-bottom: 20px;
    background: #222;
    color: white;
    border: none;
  }

  .meal { margin-bottom: 25px; }

  .item {
    opacity: 0.85;
    margin-left: 10px;
    margin-top: 4px;
  }
</style>
</head>

<body>

<h1>NOM</h1>
<div id="status">Loading...</div>

<select id="hallSelect"></select>
<div id="menu"></div>

<script>
let data = [];

function setStatus(msg) {
  const el = document.getElementById("status");
  if (el) el.textContent = msg;
}

async function loadMenu() {
  try {
    const res = await fetch("menu.json");

    if (!res.ok) {
      setStatus("Failed to load menu.json");
      return;
    }

    data = await res.json();

    initUI();
    setStatus("Loaded");

  } catch (err) {
    setStatus("Error loading data");
  }
}

function initUI() {
  const select = document.getElementById("hallSelect");
  select.innerHTML = "";

  data.forEach((hall, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = hall.diningHall;
    select.appendChild(option);
  });

  render(0);

  select.addEventListener("change", e => {
    render(e.target.value);
  });
}

function render(index) {
  const hall = data[index];
  const container = document.getElementById("menu");
  container.innerHTML = "";

  Object.entries(hall.meals).forEach(([meal, items]) => {
    const div = document.createElement("div");
    div.className = "meal";

    const title = document.createElement("h3");
    title.textContent = meal;
    div.appendChild(title);

    items.forEach(item => {
      const el = document.createElement("div");
      el.className = "item";
      el.textContent = item;
      div.appendChild(el);
    });

    container.appendChild(div);
  });
}

loadMenu();
</script>

</body>
</html>
