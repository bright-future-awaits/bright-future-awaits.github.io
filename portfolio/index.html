<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Aaron DeNuto</title>

<style>
  body {
    margin: 0;
    background: #111;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
    background: black;
  }

  .topbar a {
    text-decoration: none;
    color: white;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
    padding: 15px;
  }

  .card {
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.4s;
  }

  .card:hover img {
    transform: scale(1.05);
    filter: brightness(0.7);
  }

  .overlay {
    position: absolute;
    bottom: 0;
    padding: 15px;
    opacity: 0;
    transition: 0.3s;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
  }

  .card:hover .overlay {
    opacity: 1;
  }
</style>
</head>

<body>

<div class="topbar">
  <a href="/"><h1>AARON DENUTO</h1></a>
</div>

<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
    <div class="overlay">
      <h3>Project One</h3>
      <p>Description</p>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    <div class="overlay">
      <h3>Project Two</h3>
      <p>Description</p>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975922284-9e0b6e3c1d3d">
    <div class="overlay">
      <h3>Project Three</h3>
      <p>Description</p>
    </div>
  </div>

</div>

</body>
</html>
